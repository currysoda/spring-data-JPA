spring:
    application:
        name: springdatajpa

    datasource:
        # url: jdbc:h2:tcp://localhost/~/datajpa
        url: jdbc:p6spy:h2:tcp://localhost/~/datajpa
        username: sa
        password: ""
        # driver-class-name: org.h2.Driver
        driver-class-name: com.p6spy.engine.spy.P6SpyDriver

    jpa:
        hibernate:
            ddl-auto: create
        properties:
            hibernate:
#                show_sql: true
#                format_sql: true
#                highlight_sql: true
                default_batch_fetch_size: 1000

